name: Deploy GAS and Sync Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write .clasp.json
        run: |
          cat > .clasp.json <<EOF
          {
            "scriptId": "${{ secrets.GAS_SCRIPT_ID }}",
            "rootDir": "src"
          }
          EOF

      - name: Write clasp credentials
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.clasprc.json" <<EOF
          {
            "token": {
              "access_token": "${{ secrets.CLASP_ACCESS_TOKEN }}",
              "refresh_token": "${{ secrets.CLASP_REFRESH_TOKEN }}",
              "scope": "https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.external_request https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/script.scriptapp https://www.googleapis.com/auth/drive",
              "token_type": "Bearer",
              "expiry_date": 4102444800000
            },
            "oauth2ClientSettings": {
              "clientId": "${{ secrets.CLASP_CLIENT_ID }}",
              "clientSecret": "${{ secrets.CLASP_CLIENT_SECRET }}",
              "redirectUri": "http://localhost"
            },
            "isLocalCreds": false
          }
          EOF

      - name: Push source to Apps Script
        run: clasp push -f

      - name: Sync external API keys to Script Properties
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          clasp run-function setApiKeysFromParams             --params "[\"${FRED_API_KEY}\",\"${ALPHA_VANTAGE_API_KEY}\"]"
